syntax = "proto3";

package com.demo.gym;

option java_multiple_files = true;
option java_package = "com.demo.gym.controller";
option java_outer_classname = "BillProto";

import "google/protobuf/timestamp.proto";

service BillService {
  rpc GetMemberBills (GetMemberBillsRequest) returns (MemberBillsResponse);
  rpc GetOutstandingBalance (OutstandingBalanceRequest) returns (OutstandingBalanceResponse);
  rpc GetBill (GetBillRequest) returns (BillResponse);
}

enum BillGrpcStatus {
  STATUS_UNSPECIFIED = 0;
  STATUS_OPEN = 1;
  STATUS_CLOSED = 2;
}

message GetBillRequest {
  int64 id = 1;
}

message GetMemberBillsRequest {
  int64 member_id = 1;
}

message OutstandingBalanceRequest {
  int64 member_id = 1;
  int64 gym_id = 2;
}

message BillResponse {
  int64 id = 1;
  int64 gym_id = 2;
  int64 member_id = 3;
  BillGrpcStatus status = 4;
  string currency = 5;
  double total_amount = 6;
  google.protobuf.Timestamp issue_date = 7;
  google.protobuf.Timestamp closed_at = 8;
}

message MemberBillsResponse {
  repeated BillResponse bills = 1;
}

message OutstandingBalanceResponse {
  int64 member_id = 1;
  int64 gym_id = 2;
  string currency = 3;
  double outstanding_amount = 4;
}
